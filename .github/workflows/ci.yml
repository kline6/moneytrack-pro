name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: moneytrack
          POSTGRES_PASSWORD: moneytrack
          POSTGRES_DB: moneytrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moneytrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd apps/backend && npx prisma generate
        env:
          DATABASE_URL: postgresql://moneytrack:moneytrack@localhost:5432/moneytrack_test
      - run: pnpm --filter @moneytrack/backend build
      - run: pnpm --filter @moneytrack/backend test
        env:
          DATABASE_URL: postgresql://moneytrack:moneytrack@localhost:5432/moneytrack_test
          JWT_ACCESS_SECRET: test-secret
